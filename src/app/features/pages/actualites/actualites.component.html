<section class="page-intro">
  <div class="container">
    <div class="crumb"><a href="/">Accueil</a> › Actualités</div>
    <h1>ACTUALITÉS</h1>
    <p class="lead">
      Toute l'actualité du padel au Sénégal et en Afrique francophone : tournois, clubs, transferts,
      fédération.
    </p>
  </div>
</section>

<main class="container">
  <div class="chips">
    <button class="chip on">Tout</button>
    <button class="chip red">Résultats</button>
    <button class="chip">Actualités</button>
    <button class="chip blue">Interview</button>
    <button class="chip blue">Coaching</button>
    <button class="chip violet">Classements</button>
    <button class="chip coral">International</button>
  </div>

  <div class="layout">
    <div class="main-col">
      <div class="card-grid-3">
        @for (article of articles; track article.title) {
          <app-news-card
            [cardClass]="article.cardClass"
            [badgeClass]="article.cls"
            [badgeText]="article.cat"
            [phClass]="article.ph"
            [title]="article.title"
            [author]="article.auth"
            [date]="article.date"
            [read]="article.read"
            [link]="'/actualites/' + article.slug"
          />
        }
      </div>

      <div class="pagination">
        <a href="#">‹</a>
        <span class="on">1</span>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">5</a>
        <a href="#">›</a>
      </div>
    </div>

    <app-sidebar />
  </div>
</main>
